name: VAX Evidence Scan
description: Publish CI-collected vendor assurance evidence to VAX.
author: AtA Systems
branding:
  icon: shield
  color: green
inputs:
  vax_key:
    description: Per-job VAX key. Pass your VAX_KEY secret from the workflow.
    required: false
  endpoint:
    description: VAX Firebase function endpoint.
    required: false
    default: https://us-central1-vax-ata-systems.cloudfunctions.net/action_start_run
  scan_types:
    description: Comma-separated scan types to run. Currently supports asvs-l1, asvs-l2, wstg, nist-sp800-161r1-tier3, cmmc-level2, and dora.
    required: false
    default: asvs-l1,asvs-l2
  scan_levels:
    description: Deprecated alias for scan_types.
    required: false
  evidence_paths:
    description: Comma-separated files or directories to scan.
    required: false
    default: .
  artifact_paths:
    description: Comma-separated typed artifact manifests or evidence files to ingest in addition to repository evidence.
    required: false
    default: ""
  max_files:
    description: Maximum number of evidence files to include.
    required: false
    default: "120"
  max_bytes:
    description: Maximum total evidence content bytes to upload.
    required: false
    default: "750000"
  max_file_bytes:
    description: Maximum content bytes per evidence file.
    required: false
    default: "24000"
runs:
  using: node20
  main: dist/index.js
